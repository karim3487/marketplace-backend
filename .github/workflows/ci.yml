name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: marketplace
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Lint & Format)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Database Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://admin:changeme@localhost:5432/marketplace
        run: |
          uv run alembic upgrade head

      - name: Run Smoke Tests
        env:
          DATABASE_URL: postgresql+asyncpg://admin:changeme@localhost:5432/marketplace
        run: |
          PYTHONPATH=. uv run pytest tests/test_smoke.py
